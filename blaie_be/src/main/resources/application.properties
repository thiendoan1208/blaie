spring.application.name=blaie_be
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

blaie.auth.access-token-secret=${BLAIE_AUTH_ACCESS_TOKEN_SECRET}
blaie.auth.access-token-issuer=${BLAIE_AUTH_ACCESS_TOKEN_ISSUER:blaie-api}
blaie.auth.access-token-audience=${BLAIE_AUTH_ACCESS_TOKEN_AUDIENCE:blaie-clients}
blaie.auth.access-token-active-key-id=${BLAIE_AUTH_ACCESS_TOKEN_ACTIVE_KEY_ID:v1}
blaie.auth.access-token-previous-key-id=${BLAIE_AUTH_ACCESS_TOKEN_PREVIOUS_KEY_ID:}
blaie.auth.access-token-previous-secret=${BLAIE_AUTH_ACCESS_TOKEN_PREVIOUS_SECRET:}
blaie.auth.access-token-ttl=${BLAIE_AUTH_ACCESS_TOKEN_TTL:15m}
blaie.auth.refresh-token-ttl=${BLAIE_AUTH_REFRESH_TOKEN_TTL:30d}
blaie.auth.cookie-secure=${BLAIE_AUTH_COOKIE_SECURE:false}
blaie.auth.cookie-same-site=${BLAIE_AUTH_COOKIE_SAME_SITE:Lax}
blaie.security.cors.allowed-origins=${BLAIE_CORS_ALLOWED_ORIGINS:http://localhost:3000}

server.error.whitelabel.enabled=false

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n
