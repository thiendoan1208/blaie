spring.application.name=blaie_be
spring.config.import=optional:file:.env[.properties]

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / migrations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

# AI text classification (DeepSeek)
blaie.ai.provider=${BLAIE_AI_PROVIDER:deepseek}
blaie.ai.deepseek.api-key=${BLAIE_DEEPSEEK_API_KEY:}
blaie.ai.deepseek.base-url=${BLAIE_DEEPSEEK_BASE_URL:https://api.deepseek.com}
blaie.ai.deepseek.model=${BLAIE_DEEPSEEK_MODEL:deepseek-v4-flash}
blaie.ai.deepseek.timeout=${BLAIE_DEEPSEEK_TIMEOUT:8s}

# Distributed AI provider concurrency guard. The lease must exceed every provider request timeout.
blaie.ai.concurrency.enabled=${BLAIE_AI_CONCURRENCY_ENABLED:true}
blaie.ai.concurrency.key-prefix=${BLAIE_AI_CONCURRENCY_KEY_PREFIX:blaie:ai:concurrency}
blaie.ai.concurrency.default-limit=${BLAIE_AI_CONCURRENCY_DEFAULT_LIMIT:1}
blaie.ai.concurrency.provider-limits.deepseek=${BLAIE_DEEPSEEK_MAX_CONCURRENCY:1}
blaie.ai.concurrency.lease-duration=${BLAIE_AI_CONCURRENCY_LEASE_DURATION:30s}
blaie.ai.concurrency.renewal-interval=${BLAIE_AI_CONCURRENCY_RENEWAL_INTERVAL:10s}
blaie.ai.concurrency.renewal-pool-size=${BLAIE_AI_CONCURRENCY_RENEWAL_POOL_SIZE:1}
blaie.ai.concurrency.poll-interval=${BLAIE_AI_CONCURRENCY_POLL_INTERVAL:100ms}

# Durable asynchronous text capture processing
blaie.capture.processing.enabled=${BLAIE_CAPTURE_PROCESSING_ENABLED:true}
blaie.capture.processing.accept-async-enabled=${BLAIE_CAPTURE_ACCEPT_ASYNC_ENABLED:${blaie.capture.processing.enabled}}
blaie.capture.processing.publisher-enabled=${BLAIE_CAPTURE_PUBLISHER_ENABLED:${blaie.capture.processing.enabled}}
blaie.capture.processing.worker-enabled=${BLAIE_CAPTURE_WORKER_ENABLED:${blaie.capture.processing.enabled}}
blaie.capture.processing.recovery-enabled=${BLAIE_CAPTURE_RECOVERY_ENABLED:${blaie.capture.processing.enabled}}
blaie.capture.processing.max-attempts=${BLAIE_CAPTURE_MAX_ATTEMPTS:4}
blaie.capture.processing.idempotency-ttl=${BLAIE_CAPTURE_IDEMPOTENCY_TTL:24h}
blaie.capture.processing.lease-duration=${BLAIE_CAPTURE_JOB_LEASE_DURATION:30s}
blaie.capture.processing.heartbeat-interval=${BLAIE_CAPTURE_JOB_HEARTBEAT_INTERVAL:10s}
blaie.capture.processing.retry-delays[0]=${BLAIE_CAPTURE_RETRY_DELAY_1:2s}
blaie.capture.processing.retry-delays[1]=${BLAIE_CAPTURE_RETRY_DELAY_2:10s}
blaie.capture.processing.retry-delays[2]=${BLAIE_CAPTURE_RETRY_DELAY_3:30s}
blaie.capture.processing.dispatch-retry-delays[0]=${BLAIE_CAPTURE_DISPATCH_RETRY_DELAY_1:30s}
blaie.capture.processing.dispatch-retry-delays[1]=${BLAIE_CAPTURE_DISPATCH_RETRY_DELAY_2:2m}
blaie.capture.processing.dispatch-retry-delays[2]=${BLAIE_CAPTURE_DISPATCH_RETRY_DELAY_3:10m}
blaie.capture.processing.stream-key=${BLAIE_CAPTURE_STREAM_KEY:blaie:capture:text-jobs}
blaie.capture.processing.consumer-group=${BLAIE_CAPTURE_CONSUMER_GROUP:capture-text-workers}
blaie.capture.processing.consumer-name=${BLAIE_CAPTURE_CONSUMER_NAME:${HOSTNAME:local}-${random.uuid}}
blaie.capture.processing.batch-size=${BLAIE_CAPTURE_JOB_BATCH_SIZE:10}
blaie.capture.processing.read-block=${BLAIE_CAPTURE_STREAM_READ_BLOCK:200ms}
blaie.capture.processing.poll-interval=${BLAIE_CAPTURE_POLL_INTERVAL:1s}
blaie.capture.processing.recovery-interval=${BLAIE_CAPTURE_RECOVERY_INTERVAL:2s}
blaie.capture.processing.outbox-recovery-age=${BLAIE_CAPTURE_OUTBOX_RECOVERY_AGE:10s}
blaie.capture.processing.outbox-recovery-interval=${BLAIE_CAPTURE_OUTBOX_RECOVERY_INTERVAL:10s}
blaie.capture.processing.stream-retention=${BLAIE_CAPTURE_STREAM_RETENTION:24h}
blaie.capture.processing.stream-cleanup-interval=${BLAIE_CAPTURE_STREAM_CLEANUP_INTERVAL:1h}
blaie.capture.processing.worker-core-pool-size=${BLAIE_CAPTURE_WORKER_CORE_POOL_SIZE:1}
blaie.capture.processing.worker-max-pool-size=${BLAIE_CAPTURE_WORKER_MAX_POOL_SIZE:1}
blaie.capture.processing.worker-queue-capacity=${BLAIE_CAPTURE_WORKER_QUEUE_CAPACITY:0}
blaie.capture.processing.worker-keep-alive=${BLAIE_CAPTURE_WORKER_KEEP_ALIVE:30s}
blaie.capture.processing.worker-shutdown-await=${BLAIE_CAPTURE_WORKER_SHUTDOWN_AWAIT:30s}
blaie.capture.processing.heartbeat-pool-size=${BLAIE_CAPTURE_HEARTBEAT_POOL_SIZE:1}
blaie.capture.processing.scheduler-pool-size=${BLAIE_CAPTURE_SCHEDULER_POOL_SIZE:1}
blaie.capture.processing.event-core-pool-size=${BLAIE_CAPTURE_EVENT_CORE_POOL_SIZE:1}
blaie.capture.processing.event-max-pool-size=${BLAIE_CAPTURE_EVENT_MAX_POOL_SIZE:2}
blaie.capture.processing.event-queue-capacity=${BLAIE_CAPTURE_EVENT_QUEUE_CAPACITY:100}
blaie.capture.processing.max-active-jobs-per-user=${BLAIE_CAPTURE_MAX_ACTIVE_JOBS_PER_USER:10}
blaie.capture.processing.max-active-jobs-total=${BLAIE_CAPTURE_MAX_ACTIVE_JOBS_TOTAL:1000}
blaie.capture.processing.max-oldest-queued-age=${BLAIE_CAPTURE_MAX_OLDEST_QUEUED_AGE:5m}
blaie.capture.processing.admission-retry-after=${BLAIE_CAPTURE_ADMISSION_RETRY_AFTER:30s}

# Auth tokens and cookies
blaie.auth.access-token-secret=${BLAIE_AUTH_ACCESS_TOKEN_SECRET}
blaie.auth.access-token-issuer=${BLAIE_AUTH_ACCESS_TOKEN_ISSUER:blaie-api}
blaie.auth.access-token-audience=${BLAIE_AUTH_ACCESS_TOKEN_AUDIENCE:blaie-clients}
blaie.auth.access-token-active-key-id=${BLAIE_AUTH_ACCESS_TOKEN_ACTIVE_KEY_ID:v1}
blaie.auth.access-token-previous-key-id=${BLAIE_AUTH_ACCESS_TOKEN_PREVIOUS_KEY_ID:}
blaie.auth.access-token-previous-secret=${BLAIE_AUTH_ACCESS_TOKEN_PREVIOUS_SECRET:}
blaie.auth.access-token-ttl=${BLAIE_AUTH_ACCESS_TOKEN_TTL:15m}
blaie.auth.refresh-token-ttl=${BLAIE_AUTH_REFRESH_TOKEN_TTL:30d}
blaie.auth.cookie-secure=${BLAIE_AUTH_COOKIE_SECURE:false}
blaie.auth.cookie-same-site=${BLAIE_AUTH_COOKIE_SAME_SITE:Lax}

# Browser security
blaie.security.cors.allowed-origins=${BLAIE_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Email provider and token lifetimes
blaie.email.provider=${BLAIE_EMAIL_PROVIDER}
blaie.email.from=${BLAIE_EMAIL_FROM}
blaie.email.web-base-url=${BLAIE_WEB_BASE_URL}
blaie.email.api-base-url=${BLAIE_API_BASE_URL}
blaie.email.verification-ttl=${BLAIE_EMAIL_VERIFICATION_TTL}
blaie.email.password-reset-ttl=${BLAIE_PASSWORD_RESET_TTL:15m}

# Business guard for resend verification email.
# This is separate from the generic Redis HTTP rate limit below.
blaie.email.verification-resend-cooldown=${BLAIE_EMAIL_VERIFICATION_RESEND_COOLDOWN:60s}
blaie.email.verification-resend-quota-window=${BLAIE_EMAIL_VERIFICATION_RESEND_QUOTA_WINDOW:24h}
blaie.email.verification-resend-quota-limit=${BLAIE_EMAIL_VERIFICATION_RESEND_QUOTA_LIMIT:5}
blaie.email.resend-api-key=${BLAIE_RESEND_API_KEY:${RESEND_API_KEY:}}

# Google OAuth
blaie.google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}
blaie.google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
blaie.google.oauth.redirect-uri=${BLAIE_GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/auth/google/callback}
blaie.google.oauth.web-base-url=${BLAIE_WEB_BASE_URL}
blaie.google.oauth.authorization-uri=${BLAIE_GOOGLE_OAUTH_AUTHORIZATION_URI:https://accounts.google.com/o/oauth2/v2/auth}
blaie.google.oauth.token-uri=${BLAIE_GOOGLE_OAUTH_TOKEN_URI:https://oauth2.googleapis.com/token}
blaie.google.oauth.user-info-uri=${BLAIE_GOOGLE_OAUTH_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
blaie.google.oauth.state-ttl=${BLAIE_GOOGLE_OAUTH_STATE_TTL:10m}

# Redis HTTP rate limit - global behavior
blaie.rate-limit.enabled=${BLAIE_RATE_LIMIT_ENABLED:true}
blaie.rate-limit.fail-open=${BLAIE_RATE_LIMIT_FAIL_OPEN:true}
blaie.rate-limit.use-forwarded-headers=${BLAIE_RATE_LIMIT_USE_FORWARDED_HEADERS:false}
blaie.rate-limit.key-prefix=${BLAIE_RATE_LIMIT_KEY_PREFIX:blaie:rl}
# A separate production secret is recommended. Falling back to the access-token secret keeps existing deployments bootable.
blaie.rate-limit.subject-hmac-secret=${BLAIE_RATE_LIMIT_SUBJECT_HMAC_SECRET:${blaie.auth.access-token-secret}}

# Redis HTTP rate limit - login attempts
# Subject: client IP + login identifier hash.
# windows[0]: short burst control; windows[1]: longer brute-force backstop.
blaie.rate-limit.auth-login.enabled=${BLAIE_RATE_LIMIT_AUTH_LOGIN_ENABLED:true}
blaie.rate-limit.auth-login.windows[0].permit-limit=${BLAIE_RATE_LIMIT_AUTH_LOGIN_SHORT_LIMIT:5}
blaie.rate-limit.auth-login.windows[0].window=${BLAIE_RATE_LIMIT_AUTH_LOGIN_SHORT_WINDOW:1m}
blaie.rate-limit.auth-login.windows[1].permit-limit=${BLAIE_RATE_LIMIT_AUTH_LOGIN_LONG_LIMIT:20}
blaie.rate-limit.auth-login.windows[1].window=${BLAIE_RATE_LIMIT_AUTH_LOGIN_LONG_WINDOW:15m}

# Redis HTTP rate limit - account registration
# Subject: client IP + email hash.
# windows[0]: short signup spam control; windows[1]: longer abuse backstop.
blaie.rate-limit.auth-register.enabled=${BLAIE_RATE_LIMIT_AUTH_REGISTER_ENABLED:true}
blaie.rate-limit.auth-register.windows[0].permit-limit=${BLAIE_RATE_LIMIT_AUTH_REGISTER_SHORT_LIMIT:3}
blaie.rate-limit.auth-register.windows[0].window=${BLAIE_RATE_LIMIT_AUTH_REGISTER_SHORT_WINDOW:10m}
blaie.rate-limit.auth-register.windows[1].permit-limit=${BLAIE_RATE_LIMIT_AUTH_REGISTER_LONG_LIMIT:20}
blaie.rate-limit.auth-register.windows[1].window=${BLAIE_RATE_LIMIT_AUTH_REGISTER_LONG_WINDOW:1h}

# Redis HTTP rate limit - password reset email requests
# Subject: client IP + email hash.
# windows[0]: short email send control; windows[1]: longer reset spam backstop.
blaie.rate-limit.password-reset-request.enabled=${BLAIE_RATE_LIMIT_PASSWORD_RESET_REQUEST_ENABLED:true}
blaie.rate-limit.password-reset-request.windows[0].permit-limit=${BLAIE_RATE_LIMIT_PASSWORD_RESET_REQUEST_SHORT_LIMIT:3}
blaie.rate-limit.password-reset-request.windows[0].window=${BLAIE_RATE_LIMIT_PASSWORD_RESET_REQUEST_SHORT_WINDOW:10m}
blaie.rate-limit.password-reset-request.windows[1].permit-limit=${BLAIE_RATE_LIMIT_PASSWORD_RESET_REQUEST_LONG_LIMIT:10}
blaie.rate-limit.password-reset-request.windows[1].window=${BLAIE_RATE_LIMIT_PASSWORD_RESET_REQUEST_LONG_WINDOW:1h}

# Redis HTTP rate limit - password reset confirmations
# Subject: client IP + email hash.
blaie.rate-limit.password-reset-confirm.enabled=${BLAIE_RATE_LIMIT_PASSWORD_RESET_CONFIRM_ENABLED:true}
blaie.rate-limit.password-reset-confirm.windows[0].permit-limit=${BLAIE_RATE_LIMIT_PASSWORD_RESET_CONFIRM_LIMIT:10}
blaie.rate-limit.password-reset-confirm.windows[0].window=${BLAIE_RATE_LIMIT_PASSWORD_RESET_CONFIRM_WINDOW:10m}

# Redis HTTP rate limit - verification email resend requests
# Subject: authenticated user id when available, otherwise client IP.
# This sits before the DB-backed resend cooldown/quota guard above.
blaie.rate-limit.email-verification.enabled=${BLAIE_RATE_LIMIT_EMAIL_VERIFICATION_ENABLED:true}
blaie.rate-limit.email-verification.windows[0].permit-limit=${BLAIE_RATE_LIMIT_EMAIL_VERIFICATION_LIMIT:5}
blaie.rate-limit.email-verification.windows[0].window=${BLAIE_RATE_LIMIT_EMAIL_VERIFICATION_WINDOW:10m}

# Redis HTTP rate limit - session refresh
# Subject: client IP + refresh cookie hash.
blaie.rate-limit.auth-refresh.enabled=${BLAIE_RATE_LIMIT_AUTH_REFRESH_ENABLED:true}
blaie.rate-limit.auth-refresh.windows[0].permit-limit=${BLAIE_RATE_LIMIT_AUTH_REFRESH_LIMIT:30}
blaie.rate-limit.auth-refresh.windows[0].window=${BLAIE_RATE_LIMIT_AUTH_REFRESH_WINDOW:1m}

# Redis HTTP rate limit - session logout
# Subject: authenticated user id or client IP + refresh cookie hash.
blaie.rate-limit.auth-logout.enabled=${BLAIE_RATE_LIMIT_AUTH_LOGOUT_ENABLED:true}
blaie.rate-limit.auth-logout.windows[0].permit-limit=${BLAIE_RATE_LIMIT_AUTH_LOGOUT_LIMIT:30}
blaie.rate-limit.auth-logout.windows[0].window=${BLAIE_RATE_LIMIT_AUTH_LOGOUT_WINDOW:1m}

# Redis HTTP rate limit - CSRF token fetch
# Subject: client IP.
blaie.rate-limit.csrf.enabled=${BLAIE_RATE_LIMIT_CSRF_ENABLED:true}
blaie.rate-limit.csrf.windows[0].permit-limit=${BLAIE_RATE_LIMIT_CSRF_LIMIT:120}
blaie.rate-limit.csrf.windows[0].window=${BLAIE_RATE_LIMIT_CSRF_WINDOW:1m}

# Redis HTTP rate limit - Google OAuth start
# Subject: client IP.
blaie.rate-limit.google-start.enabled=${BLAIE_RATE_LIMIT_GOOGLE_START_ENABLED:true}
blaie.rate-limit.google-start.windows[0].permit-limit=${BLAIE_RATE_LIMIT_GOOGLE_START_LIMIT:20}
blaie.rate-limit.google-start.windows[0].window=${BLAIE_RATE_LIMIT_GOOGLE_START_WINDOW:10m}

# Redis HTTP rate limit - Google OAuth callback
# Subject: client IP.
blaie.rate-limit.google-callback.enabled=${BLAIE_RATE_LIMIT_GOOGLE_CALLBACK_ENABLED:true}
blaie.rate-limit.google-callback.windows[0].permit-limit=${BLAIE_RATE_LIMIT_GOOGLE_CALLBACK_LIMIT:60}
blaie.rate-limit.google-callback.windows[0].window=${BLAIE_RATE_LIMIT_GOOGLE_CALLBACK_WINDOW:10m}

# Redis HTTP rate limit - text capture submission
# Subject: authenticated user id + client IP, both hashed. This is not a billing quota.
blaie.rate-limit.capture-text.enabled=${BLAIE_RATE_LIMIT_CAPTURE_TEXT_ENABLED:true}
blaie.rate-limit.capture-text.fail-open=${BLAIE_RATE_LIMIT_CAPTURE_TEXT_FAIL_OPEN:false}
blaie.rate-limit.capture-text.windows[0].permit-limit=${BLAIE_RATE_LIMIT_CAPTURE_TEXT_SHORT_LIMIT:10}
blaie.rate-limit.capture-text.windows[0].window=${BLAIE_RATE_LIMIT_CAPTURE_TEXT_SHORT_WINDOW:1m}
blaie.rate-limit.capture-text.windows[1].permit-limit=${BLAIE_RATE_LIMIT_CAPTURE_TEXT_LONG_LIMIT:60}
blaie.rate-limit.capture-text.windows[1].window=${BLAIE_RATE_LIMIT_CAPTURE_TEXT_LONG_WINDOW:10m}

# Redis HTTP rate limit - manual text capture retry
# Subject: authenticated user id + client IP, both hashed in the Redis key.
blaie.rate-limit.capture-retry.enabled=${BLAIE_RATE_LIMIT_CAPTURE_RETRY_ENABLED:true}
blaie.rate-limit.capture-retry.fail-open=${BLAIE_RATE_LIMIT_CAPTURE_RETRY_FAIL_OPEN:false}
blaie.rate-limit.capture-retry.windows[0].permit-limit=${BLAIE_RATE_LIMIT_CAPTURE_RETRY_SHORT_LIMIT:5}
blaie.rate-limit.capture-retry.windows[0].window=${BLAIE_RATE_LIMIT_CAPTURE_RETRY_SHORT_WINDOW:1m}
blaie.rate-limit.capture-retry.windows[1].permit-limit=${BLAIE_RATE_LIMIT_CAPTURE_RETRY_LONG_LIMIT:20}
blaie.rate-limit.capture-retry.windows[1].window=${BLAIE_RATE_LIMIT_CAPTURE_RETRY_LONG_WINDOW:10m}

# Error handling
server.error.whitelabel.enabled=false

# Logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n
